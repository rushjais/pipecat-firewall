name: Publish to PyPI

# Tag a release (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to trigger.
# Publishing uses PyPI Trusted Publishing (OIDC) — no API tokens or secrets.
on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Must match the environment named in the PyPI trusted-publisher config.
    environment:
      name: pypi
      url: https://pypi.org/p/pipecat-firewall
    permissions:
      id-token: write # OIDC token for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
